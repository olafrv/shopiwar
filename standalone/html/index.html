function()
MySprite = class
  destroyed = false
  constructor = function(id, name)
    global sprites
    this.id = id
    this.x = 0
    this.y = 0
    this.w = sprites[name].width
    this.h = sprites[name].height
    this.name = name
    this.step = 5
  end
  collision = function(my_sprite)
    distance = floor(sqrt(pow(this.x - my_sprite.x,2)+ pow(this.y - my_sprite.y,2)))
    distance_min = floor(max(this.w,this.h)/2 + max(my_sprite.w, my_sprite.h)/2)
    if distance <= distance_min then
      return true
    else
      return false
    end
  end
end

Friend = class extends MySprite
  constructor = function(id, name)
    super(id, name)
    this.w = 48
    this.h = 48
  end
  left = function()
    this.x -= this.step
  end
  right = function()
    this.x += this.step
  end
  down = function()
    this.y -= this.step
  end
  up = function()
    this.y += this.step
  end
end

Misile = class extends MySprite
  constructor = function(id, name, x, y)
    super(id, name)
    this.x = x
    this.y = y
    this.step = 10
    this.w = 24
    this.h = 24
    flying = every 50 do
      this.fly()
    end
  end
  fly = function()
    if this.destroyed == false then
      if this.y + this.step < floor(screen.height/2) then
        this.y += this.step
      else
        this.flying.stop()
        this.destroyed = true
      end
    end
  end
end

Enemy = class extends MySprite
  constructor = function(id, name)
    super(id, name)
  end
  update_position = function()
      xd = random.nextInt(2)
      if xd == 1 then
        xd = 1
      else
        xd = -1
      end
      this.x = random.nextInt(floor(screen.width/2)) * xd
      this.y = random.nextInt(floor(screen.height/2))
  end
end

end()



function()
init = function()
  global kills = 0
  global entities = []
  global misiles = []
  global jet =  new Friend("j1", "jet")
  global enemy = new Enemy("s1", "shopify")
  audio.playMusic("fluffingaduck", 0.2, 1)
  entities.push(jet)
  entities.push(enemy)
  thread = every 1500 do
    enemy.update_position()
  end
end

update = function()
  global jet
  global misiles
  global enemy
  local mouse_x = floor(mouse.x)
  local mouse_y = floor(mouse.y)
  jet.x = mouse_x
  jet.y = mouse_y
  for m in misiles
    if m.collision(enemy) then
      m.destroyed = true
      enemy.destroyed = true
    end
  end
  if mouse.left == 1 then
    misile = new Misile("m", "misile", mouse_x, mouse_y)
    audio.playSound("missile", 1, 1, 0, 0)
    misiles.push(misile)
    entities.push(misile)
  end
end

draw = function()
  global entities
  global misiles
  global kills
  screen.clear()
  screen.drawText("Hits: " + kills, screen.width/2-75,screen.height/2-20, 30, "#FFF")
  for i in entities
    if i.destroyed then
      if i.name == "shopify" then
        screen.drawSprite("explosion2", i.x, i.y, sprites["explosion2"].width, sprites["explosion2"].height)
        i.destroyed = false
        kills += 1
      elsif i.name == "misile" then
        screen.drawSprite("explosion1", i.x, i.y, sprites["explosion1"].width, sprites["explosion1"].height)
        entities.removeElement(i)
        misiles.removeElement(i)
      end
    else
      screen.drawSprite(i.name, i.x, i.y, i.w, i.h)
    end
  end
end
end()
